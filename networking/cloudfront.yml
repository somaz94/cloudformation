AWSTemplateFormatVersion: '2010-09-09'

Description:
  'CloudFront Distribution IaC'

Parameters:
  ProjectName:
    Type: String
  ENV:
    Type: String
    AllowedValues:
      - dev
      - prod

Conditions:
  IsProd: !Equals [!Ref ENV, 'prod']

Resources:
  # Origin Access Control for S3
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-${ENV}-oac'
        Description: !Sub 'OAC for ${ProjectName}-${ENV} S3 bucket'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName}-${ENV}-distribution'
        DefaultRootObject: index.html
        PriceClass: !If [IsProd, PriceClass_200, PriceClass_100]
        Origins:
          - Id: !Sub '${ProjectName}-${ENV}-s3-origin'
            DomainName:
              !Sub
                - '${BucketName}.s3.${AWS::Region}.amazonaws.com'
                - BucketName:
                    Fn::ImportValue: !Sub '${ProjectName}-${ENV}-S3Bucket'
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: !Sub '${ProjectName}-${ENV}-s3-origin'
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        HttpVersion: http2

  # S3 Bucket Policy to allow CloudFront OAC access
  S3BucketPolicyForCloudFront:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Fn::ImportValue: !Sub '${ProjectName}-${ENV}-S3Bucket'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: 's3:GetObject'
            Resource:
              !Sub
                - 'arn:aws:s3:::${BucketName}/*'
                - BucketName:
                    Fn::ImportValue: !Sub '${ProjectName}-${ENV}-S3Bucket'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

Outputs:
  DistributionId:
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${ProjectName}-${ENV}-DistributionId'
  DomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${ProjectName}-${ENV}-DomainName'
